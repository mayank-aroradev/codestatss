<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CodeStats — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c14;--surface:#12151f;--surface2:#1a1d2e;--border:#232640;--text:#e8eaf6;--muted:#7b8199;--accent:#6366f1;--accent2:#06b6d4;--danger:#ef4444;--green:#10b981}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;margin:0 auto 14px;letter-spacing:-2px}
.logo-text{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:13px;color:var(--muted);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface2);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px;border-radius:8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.3)}
.form-group{margin-bottom:14px}
label{display:block;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
input{width:100%;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;outline:none;transition:all .2s;font-family:inherit}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
input::placeholder{color:#404566}
.btn{width:100%;padding:11px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:4px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.9;box-shadow:0 4px 16px rgba(99,102,241,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
#msg{font-size:12px;margin-top:10px;padding:9px 12px;border-radius:8px;display:none}
.msg-err{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.msg-ok{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.hint{font-size:11px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">CS</div>
    <div class="logo-text">CodeStats</div>
    <div class="logo-sub">DSA Performance Hub</div>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <!-- Login form -->
    <div id="form-login">
      <div class="form-group"><label>Email</label><input id="l-email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="form-group"><label>Password</label><input id="l-pass" type="password" placeholder="Your password" autocomplete="current-password"/></div>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In →</button>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none">
      <div class="form-group"><label>Username</label><input id="r-user" placeholder="coolcoder42" autocomplete="username"/></div>
      <div class="form-group"><label>Email</label><input id="r-email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="form-group">
        <label>Password</label>
        <input id="r-pass" type="password" placeholder="At least 8 characters" autocomplete="new-password"/>
        <div class="hint">Minimum 8 characters</div>
      </div>
      <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">Create Account →</button>
    </div>

    <div id="msg"></div>
  </div>
</div>
<script>
function switchTab(t) {
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-register').style.display = t==='register'?'block':'none';
  document.getElementById('tab-login').className = 'tab'+(t==='login'?' active':'');
  document.getElementById('tab-register').className = 'tab'+(t==='register'?' active':'');
  document.getElementById('msg').style.display='none';
}
function showMsg(m, ok=false) {
  const el = document.getElementById('msg');
  el.textContent = m;
  el.className = ok ? 'msg-ok' : 'msg-err';
  el.style.display = 'block';
}
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!email || !password) return showMsg('Please fill in all fields.');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (d.success) { window.location.href = '/dashboard'; }
    else showMsg(d.error || 'Invalid credentials.');
  } catch { showMsg('Network error.'); }
  btn.disabled = false; btn.textContent = 'Sign In →';
}
async function doRegister() {
  const username = document.getElementById('r-user').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  if (!username || !email || !password) return showMsg('Please fill in all fields.');
  if (password.length < 8) return showMsg('Password must be at least 8 characters.');
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const r = await fetch('/register', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, email, password })
    });
    const d = await r.json();
    if (d.success) { window.location.href = '/dashboard'; }
    else showMsg(d.error || 'Registration failed.');
  } catch { showMsg('Network error.'); }
  btn.disabled = false; btn.textContent = 'Create Account →';
}
// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('form-login').style.display !== 'none') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
